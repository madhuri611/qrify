<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qrify - Cosmic Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #090a0f;
            --panel: rgba(17, 18, 27, 0.75);
            --brand-gradient: linear-gradient(135deg, #8b5cf6, #06b6d4);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --glow: rgba(139, 92, 246, 0.25);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background-color: var(--bg); 
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(6, 116, 212, 0.15) 0%, transparent 40%);
            color: var(--text); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 1rem; 
        }
        
        .auth-container { 
            background: var(--panel); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 100%; 
            max-width: 440px; 
            border-radius: 24px; 
            padding: 3rem 2.5rem; 
            border: 1px solid var(--border); 
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.7), 0 0 50px 0 var(--glow);
        }
        
        .header { text-align: center; margin-bottom: 2.5rem; }
        .header h1 { 
            background: var(--brand-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.2rem; 
            font-weight: 800; 
            margin-bottom: 0.5rem; 
            letter-spacing: -1px;
        }
        .header p { color: var(--text-muted); font-size: 0.9rem; }
        
        .toggle-box { display: flex; background: rgba(255, 255, 255, 0.04); padding: 0.35rem; border-radius: 12px; margin-bottom: 2rem; border: 1px solid var(--border); }
        .toggle-btn { flex: 1; border: none; background: none; padding: 0.65rem; font-weight: 600; font-size: 0.85rem; cursor: pointer; border-radius: 8px; color: var(--text-muted); transition: all 0.3s; }
        .toggle-btn.active { background: #ffffff; color: #090a0f; box-shadow: 0 4px 12px rgba(255,255,255,0.2); }
        
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 0.6rem; }
        
        input { 
            width: 100%; 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 0.85rem 1.2rem; 
            font-size: 0.95rem; 
            outline: none; 
            background: rgba(255, 255, 255, 0.03); 
            color: #fff;
            transition: all 0.3s;
        }
        input:focus { border-color: #8b5cf6; background: rgba(255, 255, 255, 0.07); box-shadow: 0 0 15px rgba(139, 92, 246, 0.2); }
        
        .password-wrapper { position: relative; display: flex; align-items: center; }
        .password-wrapper input { padding-right: 3rem; }

        .toggle-password-btn {
            position: absolute; right: 14px; background: none; border: none; cursor: pointer;
            font-size: 1.1rem; display: flex; align-items: center; justify-content: center; opacity: 0.6; transition: opacity 0.2s;
        }
        .toggle-password-btn:hover { opacity: 1; }
        
        .btn-action { 
            width: 100%; 
            background: var(--brand-gradient); 
            color: white; 
            border: none; 
            padding: 1rem; 
            border-radius: 12px; 
            font-size: 1rem; 
            font-weight: 700; 
            cursor: pointer; 
            margin-top: 0.75rem; 
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
            transition: all 0.3s;
        }
        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(139, 92, 246, 0.6); }
        
        .error-alert { 
            background: rgba(239, 68, 68, 0.1); 
            color: #f87171; 
            border: 1px solid rgba(239, 68, 68, 0.2); 
            padding: 0.85rem; border-radius: 12px; font-size: 0.85rem; text-align: center; margin-bottom: 1.5rem; display: none; 
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="header">
            <h1>Qrify App</h1>
            <p id="headerSubtitle">Deploy lightning-fast file dynamic codes</p>
        </div>

        <div class="toggle-box">
            <button id="tabLogin" class="toggle-btn active" onclick="switchForm('LOGIN')">Sign In</button>
            <button id="tabRegister" class="toggle-btn" onclick="switchForm('REGISTER')">Get Started</button>
        </div>

        <div id="errorBox" class="error-alert">Invalid credentials, please try again.</div>

        <form id="formLogin" action="/api/auth/login" method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="loginPassword" name="password" placeholder="••••••••" required>
                    <button type="button" class="toggle-password-btn" onclick="toggleVisibility('loginPassword', this)">👁️</button>
                </div>
            </div>
            <button type="submit" class="btn-action">Enter Workspace</button>
        </form>

        <form id="formRegister" action="/api/auth/signup" method="POST" style="display: none;">
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" name="name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="registerPassword" name="password" placeholder="Create password" required>
                    <button type="button" class="toggle-password-btn" onclick="toggleVisibility('registerPassword', this)">👁️</button>
                </div>
            </div>
            <button type="submit" class="btn-action">Create Free Account</button>
        </form>
    </div>

    <script>
        function switchForm(mode) {
            if(mode === 'LOGIN') {
                document.getElementById('formLogin').style.display = 'block';
                document.getElementById('formRegister').style.display = 'none';
                document.getElementById('tabLogin').classList.add('active');
                document.getElementById('tabRegister').classList.remove('active');
                document.getElementById('headerSubtitle').innerText = "Deploy lightning-fast file dynamic codes";
            } else {
                document.getElementById('formLogin').style.display = 'none';
                document.getElementById('formRegister').style.display = 'block';
                document.getElementById('tabLogin').classList.remove('active');
                document.getElementById('tabRegister').classList.add('active');
                document.getElementById('headerSubtitle').innerText = "Register your unified generation environment";
            }
        }

        function toggleVisibility(inputId, btn) {
            const passwordInput = document.getElementById(inputId);
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                btn.innerText = "🙈";
            } else {
                passwordInput.type = "password";
                btn.innerText = "👁️";
            }
        }

        if(window.location.search.includes("error=invalid")) {
            document.getElementById('errorBox').style.display = 'block';
        }
    </script>
</body>
</html>
